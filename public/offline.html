<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SOUL Community \u2013 Offline</title>
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen,
        Ubuntu, Cantarell, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #2D5A3D 0%, #1a3a26 100%);
      color: #FFFBF5;
      text-align: center;
      padding: 2rem;
    }

    .container {
      max-width: 400px;
      width: 100%;
    }

    .logo {
      width: 80px;
      height: 80px;
      background: #C8A84E;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
      font-size: 2rem;
      font-weight: 700;
      color: #2D5A3D;
      letter-spacing: -1px;
    }

    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.5rem;
      opacity: 0.6;
    }

    .icon svg {
      width: 100%;
      height: 100%;
      stroke: #C8A84E;
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    p {
      font-size: 0.95rem;
      opacity: 0.8;
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    .retry-btn {
      display: inline-block;
      padding: 0.85rem 2rem;
      background: #C8A84E;
      color: #2D5A3D;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .retry-btn:hover {
      background: #d4b65c;
    }

    .retry-btn:active {
      transform: scale(0.97);
    }

    .divider {
      width: 40px;
      height: 3px;
      background: #C8A84E;
      border-radius: 2px;
      margin: 0 auto 1.5rem;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">S</div>

    <div class="icon">
      <svg viewBox="0 0 24 24">
        <path d="M1 1l22 22" />
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" />
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9" />
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" />
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
        <line x1="12" y1="20" x2="12.01" y2="20" />
      </svg>
    </div>

    <h1>You're Offline</h1>
    <div class="divider"></div>
    <p>Please check your internet connection and try again.</p>

    <button class="retry-btn" onclick="window.location.reload()">
      Retry
    </button>
  </div>
</body>
</html>
